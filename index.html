<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyCal – ICS Calendar Viewer</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #ffffff;
      color: #000000;
    }
    .calendar-root {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .calendar-wrap {
      width: 800px;
      height: 480px;
      display: flex;
      flex-direction: column;
    }
    .month-title {
      text-align: center;
      font-weight: 600;
      font-size: 1.2rem;
      margin-bottom: 4px;
    }
    .calendar {
      flex: 1;
      border: 1px solid #000000;
      display: flex;
      flex-direction: column;
    }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid #000000;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .weekdays span {
      padding: 4px;
      text-align: center;
    }
    .days {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(6, 1fr);
      border-top: 1px solid #000000;
    }
    .day {
      border-right: 1px solid #000000;
      border-bottom: 1px solid #000000;
      padding: 2px 3px;
      font-size: 0.7rem;
      display: flex;
      flex-direction: column;
    }
    .day:nth-child(7n) {
      border-right: none;
    }
    .day-num {
      font-weight: 600;
      margin-bottom: 2px;
    }
    .day.other-month .day-num {
      opacity: 0.35;
    }
    .event {
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 1px 2px;
      border-radius: 2px;
    }
    .event-basic {
      background: #cce4ff;
    }
    .event-calendar {
      background: #fff4b8;
    }
  </style>
</head>
<body>
  <div class="calendar-root">
    <div class="calendar-wrap">
      <div class="month-title" id="monthTitle"></div>
      <div class="calendar">
        <div class="weekdays">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span>
          <span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div id="days" class="days"></div>
      </div>
    </div>
  </div>

  <script>
    const ICS_URLS = ['https://kheemen.github.io/KmCal.github.io/basic.ics', 'https://kheemen.github.io/KmCal.github.io/calendar.ics'];

    function parseICS(text) {
      const rawLines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
      const lines = rawLines.reduce((acc, line) => {
        if (line.startsWith(' ') || line.startsWith('\t'))
          acc[acc.length - 1] += line.slice(1);
        else
          acc.push(line);
        return acc;
      }, []);

      const events = [];
      let current = null;

      for (const line of lines) {
        if (line === 'BEGIN:VEVENT') {
          current = {};
        } else if (line === 'END:VEVENT' && current) {
          if (current.DTSTART) events.push(current);
          current = null;
        } else if (current) {
          const colon = line.indexOf(':');
          if (colon !== -1) {
            const key = line.slice(0, colon).split(';')[0];
            const val = line.slice(colon + 1).replace(/\\n/g, '\n').replace(/\\,/g, ',');
            if (key === 'SUMMARY' || key === 'DTSTART' || key === 'DTEND' || key === 'DESCRIPTION') {
              current[key] = val;
            }
          }
        }
      }
      return events;
    }

    function parseICSDatetime(str) {
      const cleaned = str.replace(/\s/g, '');
      let date;
      if (cleaned.length === 8) {
        date = new Date(
          parseInt(cleaned.slice(0, 4), 10),
          parseInt(cleaned.slice(4, 6), 10) - 1,
          parseInt(cleaned.slice(6, 8), 10)
        );
      } else {
        const isUTC = cleaned.endsWith('Z');
        const d = cleaned.replace('T', '').replace('Z', '').slice(0, 15);
        const y = parseInt(d.slice(0, 4), 10);
        const m = parseInt(d.slice(4, 6), 10) - 1;
        const day = parseInt(d.slice(6, 8), 10);
        const h = parseInt(d.slice(9, 11), 10) || 0;
        const min = parseInt(d.slice(11, 13), 10) || 0;
        const sec = parseInt(d.slice(13, 15), 10) || 0;
        date = isUTC
          ? new Date(Date.UTC(y, m, day, h, min, sec))
          : new Date(y, m, day, h, min, sec);
      }
      return date;
    }

    function isDateOnly(str) {
      return str && /^\d{8}$/.test(str.replace(/\s/g, ''));
    }

    function normalizeEventDate(evt) {
      const start = parseICSDatetime(evt.DTSTART);
      const end = evt.DTEND ? parseICSDatetime(evt.DTEND) : new Date(start.getTime() + 3600000);
      const summary = (evt.SUMMARY || 'Untitled').trim();
      const allDay = isDateOnly(evt.DTSTART) && (!evt.DTEND || isDateOnly(evt.DTEND));
      const colorClass = evt.__source === 'basic' ? 'event-basic' : evt.__source === 'calendar' ? 'event-calendar' : '';
      return { start, end, summary, allDay, colorClass };
    }

    function toDateKey(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function buildEventsByDate(rawEvents) {
      const byDate = {};
      for (const e of rawEvents) {
        const { start, end, summary, allDay, colorClass } = normalizeEventDate(e);
        const date = new Date(start.getFullYear(), start.getMonth(), start.getDate());
        const endDate = new Date(end.getFullYear(), end.getMonth(), end.getDate());
        const stop = allDay ? endDate : new Date(endDate.getTime() + 86400000);
        while (date < stop) {
          const key = toDateKey(date);
          if (!byDate[key]) byDate[key] = [];
          byDate[key].push({ date: new Date(date), summary, colorClass });
          date.setDate(date.getDate() + 1);
        }
      }
      return byDate;
    }

    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let eventsByDate = {};

    function renderCalendar() {
      const first = new Date(currentYear, currentMonth, 1);
      const last = new Date(currentYear, currentMonth + 1, 0);
      let startOffset = first.getDay();
      const totalDays = last.getDate();
      const prevMonth = new Date(currentYear, currentMonth, 0);
      const prevDays = prevMonth.getDate();

      document.getElementById('monthTitle').textContent =
        first.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const daysEl = document.getElementById('days');
      daysEl.innerHTML = '';

      for (let i = 0; i < startOffset; i++) {
        const d = prevDays - startOffset + i + 1;
        const date = new Date(currentYear, currentMonth - 1, d);
        const key = toDateKey(date);
        const dayEl = document.createElement('div');
        dayEl.className = 'day other-month';
        dayEl.innerHTML = '<div class="day-num">' + d + '</div>';
        appendEvents(dayEl, key);
        daysEl.appendChild(dayEl);
      }

      for (let d = 1; d <= totalDays; d++) {
        const date = new Date(currentYear, currentMonth, d);
        const key = toDateKey(date);
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        dayEl.innerHTML = '<div class="day-num">' + d + '</div>';
        appendEvents(dayEl, key);
        daysEl.appendChild(dayEl);
      }

      const remaining = 42 - (startOffset + totalDays);
      const nextMonthFirst = new Date(currentYear, currentMonth + 1, 1);
      for (let i = 0; i < remaining; i++) {
        const d = i + 1;
        const date = new Date(currentYear, currentMonth + 1, d);
        const key = toDateKey(date);
        const dayEl = document.createElement('div');
        dayEl.className = 'day other-month';
        dayEl.innerHTML = '<div class="day-num">' + d + '</div>';
        appendEvents(dayEl, key);
        daysEl.appendChild(dayEl);
      }
    }

    function appendEvents(dayEl, key) {
      const list = eventsByDate[key] || [];
      for (const ev of list) {
        const span = document.createElement('div');
        span.className = 'event ' + (ev.colorClass || '');
        span.title = ev.summary;
        span.textContent = ev.summary;
        dayEl.appendChild(span);
      }
    }

    async function loadCalendar() {
      try {
        const responses = await Promise.all(
          ICS_URLS.map(url =>
            fetch(url).then(r => (r.ok ? r.text() : Promise.reject(new Error('Failed to fetch ' + url + ': ' + r.status))))
          )
        );
        const allRawEvents = responses
          .map((text, idx) => {
            const source = idx === 0 ? 'basic' : 'calendar';
            return parseICS(text).map(e => ({ ...e, __source: source }));
          })
          .reduce((acc, arr) => acc.concat(arr), []);

        eventsByDate = buildEventsByDate(allRawEvents);
        currentMonth = new Date().getMonth();
        currentYear = new Date().getFullYear();
        renderCalendar();
      } catch (err) {
        console.error('Calendar load error', err);
      }
    }

    document.getElementById('prevBtn')?.addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar();
    });
    document.getElementById('nextBtn')?.addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar();
    });

    window.addEventListener('DOMContentLoaded', loadCalendar);
  </script>
</body>
</html>
