<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://kheemen.github.io; img-src 'self';">
  <title>MyCal – ICS Calendar Viewer</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #FFFFFF;
      color: #000000;
    }
    .calendar-root {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .calendar-wrap {
      width: 800px;
      height: 480px;
      display: flex;
      flex-direction: column;
    }
    .month-title {
      text-align: center;
      font-weight: 600;
      font-size: 1.2rem;
      margin: 0 0 4px 0;
    }
    .calendar {
      border: 1px solid #000000;
      display: flex;
      flex-direction: column;
      height: 450px;
    }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid #000000;
      font-size: 0.8rem;
      font-weight: 600;
      height: 30px;
    }
    .weekdays span {
      padding: 4px;
      text-align: center;
    }
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(6, 1fr);
      border-top: 1px solid #000000;
      height: 420px;
    }
    .day {
      border-right: 1px solid #000000;
      border-bottom: 1px solid #000000;
      padding: 2px 3px;
      font-size: 0.7rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .day:nth-child(7n) {
      border-right: none;
    }
    .day-current-month {
      border-right-color: #000000;
      border-bottom-color: #000000;
    }
    .day-future-month {
      border-right: 1px solid transparent;
      border-bottom: 1px solid transparent;
      background-image:
        repeating-linear-gradient(to right, #00FF00 0, #00FF00 16px, transparent 16px, transparent 22px),
        repeating-linear-gradient(to bottom, #00FF00 0, #00FF00 16px, transparent 16px, transparent 22px);
      background-size: 100% 1px, 1px 100%;
      background-position: bottom, right;
      background-repeat: repeat-x, repeat-y;
    }
    .day-num {
      font-weight: 600;
      margin-bottom: 2px;
    }
    .day.other-month .day-num {
      opacity: 1;
    }
    .day-today {
      background: #FFFF00;
    }
    .day-today .day-num {
      color: #000000;
    }
    .day-weekend {
      background: #999999;
    }
    .event {
      font-size: 0.8rem;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: normal;
      word-wrap: break-word;
      padding: 1px 2px;
      border-radius: 2px;
    }
    .event-basic {
      background: #0000FF;
      color: #FFFFFF;
    }
    .event-school-holidays {
      background: #FF0000;
      color: #FFFFFF;
    }
    .event-calendar {
      background: #00FF00;
      color: #FFFFFF;
    }
  </style>
</head>
<body>
  <div class="calendar-root">
    <div class="calendar-wrap">
      <div class="month-title" id="monthTitle"></div>
      <div class="calendar">
        <div class="weekdays">
          <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span>
          <span>Thu</span><span>Fri</span><span>Sat</span>
        </div>
        <div id="days" class="days"></div>
      </div>
    </div>
  </div>

  <script>
    const ICS_URLS = [
    'https://kheemen.github.io/KmCal.github.io/school-holidays.ics',
    'https://kheemen.github.io/KmCal.github.io/basic.ics',
    'https://kheemen.github.io/KmCal.github.io/calendar.ics'];

    function parseICS(text) {
      const rawLines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
      const lines = rawLines.reduce((acc, line) => {
        if (line.startsWith(' ') || line.startsWith('\t'))
          acc[acc.length - 1] += line.slice(1);
        else
          acc.push(line);
        return acc;
      }, []);

      const events = [];
      let current = null;

      for (const line of lines) {
        if (line === 'BEGIN:VEVENT') {
          current = {};
        } else if (line === 'END:VEVENT' && current) {
          if (current.DTSTART) events.push(current);
          current = null;
        } else if (current) {
          const colon = line.indexOf(':');
          if (colon !== -1) {
            const key = line.slice(0, colon).split(';')[0];
            const val = line.slice(colon + 1).replace(/\\n/g, '\n').replace(/\\,/g, ',');
            if (key === 'SUMMARY' || key === 'DTSTART' || key === 'DTEND' || key === 'DESCRIPTION') {
              current[key] = val;
            }
          }
        }
      }
      return events;
    }

    function parseICSDatetime(str) {
      const cleaned = str.replace(/\s/g, '');
      let date;
      if (cleaned.length === 8) {
        date = new Date(
          parseInt(cleaned.slice(0, 4), 10),
          parseInt(cleaned.slice(4, 6), 10) - 1,
          parseInt(cleaned.slice(6, 8), 10)
        );
      } else {
        const isUTC = cleaned.endsWith('Z');
        const d = cleaned.replace('T', '').replace('Z', '').slice(0, 15);
        const y = parseInt(d.slice(0, 4), 10);
        const m = parseInt(d.slice(4, 6), 10) - 1;
        const day = parseInt(d.slice(6, 8), 10);
        const h = parseInt(d.slice(9, 11), 10) || 0;
        const min = parseInt(d.slice(11, 13), 10) || 0;
        const sec = parseInt(d.slice(13, 15), 10) || 0;
        date = isUTC
          ? new Date(Date.UTC(y, m, day, h, min, sec))
          : new Date(y, m, day, h, min, sec);
      }
      return date;
    }

    function isDateOnly(str) {
      return str && /^\d{8}$/.test(str.replace(/\s/g, ''));
    }

    function normalizeEventDate(evt) {
      const start = parseICSDatetime(evt.DTSTART);
      const end = evt.DTEND ? parseICSDatetime(evt.DTEND) : new Date(start.getTime() + 3600000);
      const summary = (evt.SUMMARY || 'Untitled').trim();
      const allDay = isDateOnly(evt.DTSTART) && (!evt.DTEND || isDateOnly(evt.DTEND));
      const colorClass = evt.__source === 'basic' ? 'event-basic' : evt.__source === 'school-holidays' ? 'event-school-holidays' : evt.__source === 'calendar' ? 'event-calendar' : '';
      return { start, end, summary, allDay, colorClass };
    }

    function toDateKey(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function buildEventsByDate(rawEvents) {
      const byDate = {};
      for (const e of rawEvents) {
        const { start, end, summary, allDay, colorClass } = normalizeEventDate(e);
        const date = new Date(start.getFullYear(), start.getMonth(), start.getDate());
        const endDate = new Date(end.getFullYear(), end.getMonth(), end.getDate());
        const stop = allDay ? endDate : endDate; // Fixed: Don't extend non-all-day events
        while (date < stop) {
          const key = toDateKey(date);
          if (!byDate[key]) byDate[key] = [];
          byDate[key].push({ date: new Date(date), summary, colorClass });
          date.setDate(date.getDate() + 1);
        }
      }
      return byDate;
    }

    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let eventsByDate = {};

    function getSingaporeToday() {
      const now = new Date();
      const sgString = now.toLocaleString('en-US', { timeZone: 'Asia/Singapore' });
      const sg = new Date(sgString);
      return {
        year: sg.getFullYear(),
        month: sg.getMonth(),
        day: sg.getDate(),
      };
    }

    const todaySg = getSingaporeToday();

    function renderCalendar() {
      const base = new Date(todaySg.year, todaySg.month, todaySg.day);
      const weekday = base.getDay(); // 0 = Sun
      const start = new Date(base);
      start.setDate(base.getDate() - weekday - 7); // start from previous week's Sunday

      const titleDate = base;
      document.getElementById('monthTitle').textContent =
        titleDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const daysEl = document.getElementById('days');
      while (daysEl.firstChild) daysEl.removeChild(daysEl.firstChild);

      for (let i = 0; i < 42; i++) {
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        const key = toDateKey(date);
        const isToday =
          date.getFullYear() === todaySg.year &&
          date.getMonth() === todaySg.month &&
          date.getDate() === todaySg.day;

        const isCurrentMonth =
          date.getFullYear() === todaySg.year &&
          date.getMonth() === todaySg.month;
        const isFutureMonth =
          date.getFullYear() > todaySg.year ||
          (date.getFullYear() === todaySg.year && date.getMonth() > todaySg.month);

        const dayEl = document.createElement('div');
        let cls = 'day';
        if (!isCurrentMonth) cls += ' other-month';
        if (isCurrentMonth) cls += ' day-current-month';
        if (isFutureMonth) cls += ' day-future-month';
        if (isToday) cls += ' day-today';
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        if (isWeekend && !isToday) cls += ' day-weekend';
        dayEl.className = cls;
        const numDiv = document.createElement('div');
        numDiv.className = 'day-num';
        numDiv.textContent = date.getDate();
        dayEl.appendChild(numDiv);
        appendEvents(dayEl, key);
        daysEl.appendChild(dayEl);
      }
    }

    function appendEvents(dayEl, key) {
      const list = eventsByDate[key] || [];
      for (const ev of list) {
        const span = document.createElement('div');
        span.className = 'event ' + (ev.colorClass || '');
        span.title = ev.summary;
        span.textContent = ev.summary;
        dayEl.appendChild(span);
      }
    }

    async function loadCalendar() {
      try {
        const sources = ['school-holidays', 'basic', 'calendar'];
        const allRawEvents = [];

        const results = await Promise.all(
          ICS_URLS.map(url => fetch(url).then(r => {
            if (!r.ok) throw new Error('Failed to fetch ' + url + ': ' + r.status);
            return r.text();
          }))
        );

        results.forEach((text, idx) => {
          const rawEvents = parseICS(text).map(e => ({ ...e, __source: sources[idx] }));
          allRawEvents.push(...rawEvents);
        });

        eventsByDate = buildEventsByDate(allRawEvents);
        currentMonth = new Date().getMonth();
        currentYear = new Date().getFullYear();
        renderCalendar();
      } catch (err) {
        console.error('Calendar load error', err);
      }
    }

    document.getElementById('prevBtn')?.addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar();
    });
    document.getElementById('nextBtn')?.addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar();
    });

    window.addEventListener('DOMContentLoaded', loadCalendar);
  </script>
</body>
</html>
